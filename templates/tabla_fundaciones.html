<table class="table table-hover">
    <thead class="table-light">
        <tr><th>Fundación</th><th>Estado</th><th>NIT</th></tr>
    </thead>
    <tbody>
        {% for f in fundaciones %}
        <tr>
            <td>{{ f.nombre_fundacion }}</td>
            <td><span class="badge {{ 'bg-success' if f.estado == 'activa' else 'bg-secondary' }}">{{ f.estado }}</span></td>
            <td>{{ f.nit }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
