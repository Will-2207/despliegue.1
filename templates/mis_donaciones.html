<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Donaciones — Red Solidaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <a href="{{ url_for('donaciones_bp.donante') }}" class="btn btn-outline-primary mb-4">← Volver al inicio</a>
    
    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h4 class="mb-0 fw-bold"><i class="fas fa-history text-primary"></i> Mis Aportes Solidarios</h4>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Causa</th>
                        <th>Cantidad</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    {% for d in donaciones %}
                    <tr>
                        <td class="fw-bold">{{ d.titulo_necesidad }}</td>
                        <td><span class="badge bg-success">{{ d.cantidad }}</span></td>
                        <td class="text-muted">{{ d.created_at.strftime('%d/%m/%Y %H:%M') }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center py-4">Aún no has realizado ninguna donación.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
