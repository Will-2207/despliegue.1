<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th>Nombre</th>
                <th>NIT</th>
                <th>Correo</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for f in pendientes %}
            <tr>
                <td class="fw-bold">{{ f.nombre_fundacion }}</td>
                <td>
                    {{ f.nit }} 
                    <a href="https://www.rues.org.co/ConsultarNIT?NIT={{ f.nit }}" target="_blank" class="ms-2">
                        <i class="fas fa-search text-primary"></i>
                    </a>
                </td>
                <td>{{ f.usuario.email }}</td>
                <td>
                    <button class="btn btn-success btn-sm px-3 shadow-sm" onclick="abrirModalAccion('aprobar_fundacion', '{{ f.id }}')">
                        <i class="fas fa-check me-1"></i> Aprobar
                    </button>
                    <button class="btn btn-danger btn-sm px-3 shadow-sm" onclick="abrirModalAccion('rechazar_fundacion', '{{ f.id }}')">
                        <i class="fas fa-times me-1"></i> Rechazar
                    </button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center text-muted py-4">No hay fundaciones pendientes de revisión.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
