<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro — SolidariApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --azul-solidario: #1e52ff; --verde-solidario: #63ff5e; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        .main-container { 
            width: 90%; max-width: 1100px; background: white; border-radius: 30px; 
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            display: flex; min-height: 650px; 
        }
        
        .left-side { 
            flex: 1; position: relative; background-color: #1e52ff; 
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            animation: cambiarFondo 12s infinite ease-in-out;
        }

        @keyframes cambiarFondo {
            0%, 45% { background-image: url('{{ url_for("static", filename="css/js/img/foto1.jpg") }}'); }
            50%, 95% { background-image: url('{{ url_for("static", filename="css/js/img/foto2.jpg") }}'); }
            100% { background-image: url('{{ url_for("static", filename="css/js/img/foto1.jpg") }}'); }
        }

        .overlay-caption {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 60px 40px; color: white;
        }

        .right-side { flex: 0 0 450px; padding: 40px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        .btn-custom { background: linear-gradient(135deg, var(--azul-solidario), var(--verde-solidario)); color: white; border: none; border-radius: 50px; padding: 12px; font-weight: 600; }
        
        .logo-img { 
            width: 120px; height: 120px; object-fit: contain;
            background-color: #ffffff; border: 2px solid #f0f2f5;
            border-radius: 50%; display: block; margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        #campos-fundacion { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--azul-solidario); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-side">
        <div class="overlay-caption">
            <h3 class="fw-bold">Sé parte del cambio</h3>
            <p>Únete a nuestra red de apoyo social y transforma vidas con nosotros.</p>
        </div>
    </div>

    <div class="right-side">
        <img src="{{ url_for('static', filename='perfil_13_Logo.jpeg') }}" alt="Logo" class="logo-img">
        <h3 class="fw-bold mb-4 text-center">Crear Cuenta</h3>
            
        {% if error %}
            <div class="alert alert-danger border-0 rounded-pill mb-3 text-center">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3"><input type="text" name="nombre" class="form-control" placeholder="Nombre completo" required></div>
            <div class="mb-3"><input type="text" name="direccion" class="form-control" placeholder="Dirección" required></div>
            <div class="mb-3"><input type="tel" name="telefono" class="form-control" placeholder="Teléfono" required></div>
            
            <div class="mb-3">
                <select name="tipo_persona" id="tipo_persona" class="form-select rounded-pill" required onchange="toggleFundacionFields()">
                    <option value="" disabled selected>Tipo de persona</option>
                    <option value="natural">Persona Natural</option>
                    <option value="juridica">Persona Jurídica (Fundación)</option>
                </select>
            </div>

            <div id="campos-fundacion" style="display: none;">
                <h6 class="text-primary mb-3"><i class="fas fa-building me-2"></i>Datos de Fundación</h6>
                <div class="mb-2"><input type="text" name="nit" class="form-control" placeholder="NIT de la Fundación"></div>
                <div class="mb-2"><input type="text" name="nombre_fundacion" class="form-control" placeholder="Nombre de la Fundación"></div>
                <div class="mb-2"><textarea name="descripcion" class="form-control" placeholder="Breve descripción de la labor de la fundación" rows="2"></textarea></div>
            </div>

            <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
            <div class="mb-4"><input type="password" name="pass" class="form-control" placeholder="Contraseña" required></div>
            
            <button type="submit" class="btn btn-custom w-100"><i class="fas fa-user-plus me-2"></i> Registrarse</button>
        </form>
        
        <p class="text-center mt-4 text-muted">¿Ya tienes cuenta? <a href="{{ url_for('auth_bp.login') }}" class="text-primary fw-bold text-decoration-none">Inicia sesión</a></p>
    </div>
</div>

<script>
    function toggleFundacionFields() {
        const select = document.getElementById('tipo_persona');
        const container = document.getElementById('campos-fundacion');
        const inputs = container.querySelectorAll('input, textarea');
        
        if (select.value === 'juridica') {
            container.style.display = 'block';
            inputs.forEach(input => input.setAttribute('required', 'required'));
        } else {
            container.style.display = 'none';
            inputs.forEach(input => input.removeAttribute('required'));
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
