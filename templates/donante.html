<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Donante — SolidariApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --azul-solidario: #1e52ff; --verde-solidario: #63ff5e; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar que flota y no mueve el contenido */
        #sidebar {
            position: absolute;
            left: 20px;
            top: 80px;
            width: 260px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 20px;
            z-index: 1000;
            display: none; /* Se activa con JS */
        }

        .header-dash { background: linear-gradient(135deg, var(--azul-solidario), var(--verde-solidario)); color: white; padding: 40px; border-radius: 28px; margin-bottom: 30px; text-align: center; }
        .nav-item-custom { padding: 12px; margin-bottom: 5px; border-radius: 10px; cursor: pointer; color: #333; }
        .nav-item-custom:hover { background: #f0f4ff; color: var(--azul-solidario); }
        .logo-circle { width: 40px; height: 40px; border-radius: 50%; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <div class="d-flex align-items-center">
            <button class="btn btn-light me-3" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <a class="navbar-brand fw-bold" href="#"><img src="{{ url_for('static', filename='perfil_13_Logo.jpeg') }}" class="logo-circle me-2">Red Solidaria</a>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger rounded-pill"><i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión</a>
    </div>
</nav>

<div id="sidebar">
    <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='perfil_13_Logo.jpeg') }}" style="width: 80px; border-radius: 50%;">
        <h5 class="mt-2 fw-bold">Red Solidaria</h5>
    </div>
    <div class="nav-item-custom"><i class="fas fa-home me-2"></i> Inicio</div>
    <div class="nav-item-custom"><i class="fas fa-hand-holding-heart me-2"></i> Donar</div>
    <div class="nav-item-custom"><i class="fas fa-list-ul me-2"></i> Causas Activas</div>
    <div class="nav-item-custom"><i class="fas fa-history me-2"></i> Mis Donaciones</div>
    <div class="nav-item-custom"><i class="fas fa-cog me-2"></i> Mi Perfil</div>
    <hr>
    <a href="{{ url_for('logout') }}" class="text-danger text-decoration-none ms-2"><i class="fas fa-sign-out-alt me-2"></i> Salir</a>
</div>

<div class="container py-4">
    <div class="header-dash mx-auto" style="max-width: 800px;">
        <h2 class="fw-bold">¡Bienvenido, {{ session['usuario_nombre'] }}!</h2>
    </div>

    <div class="text-center py-5">
        <i class="fas fa-heart-broken fa-3x text-muted"></i>
        <h5 class="mt-3">No hay necesidades publicadas en este momento.</h5>
    </div>
</div>

<footer class="text-center py-5">
    <h5 class="fw-bold">@red solidaria salvando vidas <i class="fas fa-heart text-danger"></i></h5>
    <p class="text-muted">Unidos para transformar historias.</p>
</footer>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.style.display = (sidebar.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
