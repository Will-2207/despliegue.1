<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error 500 | Red Solidaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul: #1e52ff; --verde: #63ff5e; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { background: white; border-radius: 20px; padding: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border-top: 8px solid var(--azul); }
        .error-code { font-size: 100px; font-weight: bold; background: linear-gradient(135deg, var(--azul), var(--verde)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-back { background: linear-gradient(135deg, var(--azul), var(--verde)); color: white; border-radius: 50px; padding: 12px 30px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="error-container col-md-6">
        <div class="error-code">500</div>
        <h2 class="fw-bold">¡Ups! Error Interno</h2>
        <p class="text-muted mb-4">{{ mensaje_error }}</p>
        <a href="{{ url_for('auth_bp.login') }}" class="btn btn-back">Volver al Inicio</a>
    </div>
</body>
</html>
