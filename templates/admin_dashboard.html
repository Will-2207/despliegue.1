<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - Red Solidaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; }
        .sidebar { background: #2c3e50; min-height: 100vh; color: white; }
        .stats-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border-left: 5px solid #1e52ff; }
        .stats-card:hover { transform: translateY(-5px); }
        .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">🏛️ Admin</h4>
            <hr>
            <button class="btn btn-outline-light w-100 mb-2" data-bs-toggle="offcanvas" data-bs-target="#offcanvasProfile">Perfil Admin</button>
            <a href="/logout" class="btn btn-danger w-100">Cerrar Sesión</a>
        </div>

        <div class="col-md-10 p-4">
            <h2>Panel Administrativo</h2>
            
            <div class="row g-3 mb-4">
                <div class="col-md-2"><div class="stats-card" onclick="loadData('donantes')"><h6>Donantes</h6><h3>{{ stats.donantes }}</h3></div></div>
                <div class="col-md-2"><div class="stats-card border-success" onclick="loadData('fundaciones')"><h6>Fundaciones</h6><h3>{{ stats.fundaciones }}</h3></div></div>
                <div class="col-md-2"><div class="stats-card border-warning" onclick="loadData('pendientes')"><h6>Pendientes</h6><h3>{{ stats.pendientes }}</h3></div></div>
                <div class="col-md-3"><div class="stats-card border-info" onclick="loadData('donaciones')"><h6>Donaciones Físicas</h6><h3>{{ stats.donaciones }}</h3></div></div>
                <div class="col-md-3"><div class="stats-card border-danger" onclick="loadData('pagos')"><h6>Transacciones</h6><h3>{{ stats.pagos }}</h3></div></div>
            </div>

            <div class="table-container" id="adminTable">
                <p>Seleccione una categoría para ver los registros.</p>
            </div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-end" id="offcanvasProfile">
    <div class="offcanvas-header"><h5 class="offcanvas-title">Mi Perfil</h5></div>
    <div class="offcanvas-body">
        <form action="/admin/update_profile" method="POST">
            <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre completo">
            <input type="email" name="email" class="form-control mb-2" placeholder="Correo">
            <button class="btn btn-primary w-100">Guardar Cambios</button>
        </form>
    </div>
</div>

<script>
    function loadData(type) {
        document.getElementById('adminTable').innerHTML = "Cargando...";
        fetch(`/admin/get_data/${type}`)
            .then(res => res.text())
            .then(html => document.getElementById('adminTable').innerHTML = html);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
